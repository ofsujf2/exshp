<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wishlist — ExecutiveShop</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="app-nav"></div>
<div class="page-header container">
  <div class="breadcrumbs"><a href="/">Home</a> / La tua wishlist</div>
  <h1>La tua wishlist</h1>
</div>
<div class="container section-sm" style="padding-top:0; max-width:820px;">

<div id="wlGrid" class="grid grid-4"><div class="skeleton" style="height:220px;"></div></div>
<script>
document.addEventListener("DOMContentLoaded", async ()=>{
  const r = await ESH.api("/api/my/wishlist");
  const el = document.getElementById("wlGrid");
  if(!r.ok){ el.innerHTML = `<div class="glass" style="padding:2rem;">Accedi per vedere la tua wishlist.</div>`; return; }
  el.innerHTML = r.data.products.map(p=>`<a href="/product.html?slug=${p.slug}" class="glass product-card tilt"><div class="product-info"><h4>${p.title}</h4><span class="price">${ESH.formatPrice(p.discount_price ?? p.price)}</span></div></a>`).join("") || `<p class="text-muted">Wishlist vuota.</p>`;
});
</script>

</div>
<div id="app-footer"></div>
<script src="/js/api.js"></script>
<script src="/js/store.js"></script>
<script src="/js/layout.js"></script>
<script>ESH.layout('/wishlist.html');</script>
</body>
</html>
