<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Traccia ordine — ExecutiveShop</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="app-nav"></div>
<div class="page-header container">
  <div class="breadcrumbs"><a href="/">Home</a> / Traccia il tuo ordine</div>
  <h1>Traccia il tuo ordine</h1>
</div>
<div class="container section-sm" style="padding-top:0; max-width:820px;">

<div class="glass" style="padding:1.8rem; max-width:460px; margin:0 auto;">
  <div class="field"><label>Numero ordine</label><input id="tOrder" placeholder="ESH-20260710-A1B2"></div>
  <div class="field"><label>Email usata per l ordine</label><input type="email" id="tEmail"></div>
  <button class="btn btn-primary btn-block" id="tSearch">Traccia</button>
  <div id="tResult" class="mt-2"></div>
</div>
<script>
document.addEventListener("DOMContentLoaded", ()=>{
  document.getElementById("tSearch").addEventListener("click", async ()=>{
    const num = document.getElementById("tOrder").value.trim();
    const email = document.getElementById("tEmail").value.trim();
    const r = await ESH.api(`/api/track-order/${encodeURIComponent(num)}?email=${encodeURIComponent(email)}`);
    const el = document.getElementById("tResult");
    if(!r.ok){ el.innerHTML = `<div class="alert alert-danger">${r.error}</div>`; return; }
    const o = r.data;
    el.innerHTML = `<div class="glass" style="padding:1.2rem;"><div class="flex justify-between"><span>Stato</span><span class="badge badge-muted">${o.status}</span></div><div class="flex justify-between mt-1"><span>Pagamento</span><span class="badge badge-warning">${o.payment_status}</span></div>${o.tracking_number? `<div class="flex justify-between mt-1"><span>Tracking</span><span>${o.tracking_number} (${o.carrier||""})</span></div>`:""}</div>`;
  });
});
</script>

</div>
<div id="app-footer"></div>
<script src="/js/api.js"></script>
<script src="/js/store.js"></script>
<script src="/js/layout.js"></script>
<script>ESH.layout('/track-order.html');</script>
</body>
</html>
