<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cerca — ExecutiveShop</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="app-nav"></div>
<div class="page-header container">
  <div class="breadcrumbs"><a href="/">Home</a> / Cerca prodotti</div>
  <h1>Cerca prodotti</h1>
</div>
<div class="container section-sm" style="padding-top:0; max-width:820px;">

<input id="sInput" placeholder="Cerca..." class="mb-2">
<div id="sGrid" class="grid grid-4"></div>
<script>
document.addEventListener("DOMContentLoaded", ()=>{
  const grid = document.getElementById("sGrid");
  let timer;
  document.getElementById("sInput").addEventListener("input", (e)=>{
    clearTimeout(timer);
    timer = setTimeout(async ()=>{
      if(!e.target.value){ grid.innerHTML=""; return; }
      const r = await ESH.api("/api/products?q=" + encodeURIComponent(e.target.value));
      grid.innerHTML = r.ok ? (r.data.products.map(p=>`<a href="/product.html?slug=${p.slug}" class="glass product-card tilt"><div class="product-info"><h4>${p.title}</h4><span class="price">${ESH.formatPrice(p.discount_price ?? p.price)}</span></div></a>`).join("") || `<p class="text-muted">Nessun risultato.</p>`) : "";
    }, 300);
  });
});
</script>

</div>
<div id="app-footer"></div>
<script src="/js/api.js"></script>
<script src="/js/store.js"></script>
<script src="/js/layout.js"></script>
<script>ESH.layout('/search.html');</script>
</body>
</html>
