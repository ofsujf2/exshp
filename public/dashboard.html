<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Il mio account — ExecutiveShop</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="app-nav"></div>
<div class="container section" style="padding-top:6.5rem;">
  <h1 class="mb-3" id="welcomeTitle">Il mio account</h1>
  <div class="flex gap-1 mb-3" style="flex-wrap:wrap;" id="tabs">
    <button class="btn btn-ghost btn-sm active-tab" data-tab="orders">Ordini</button>
    <button class="btn btn-ghost btn-sm" data-tab="wishlist">Wishlist</button>
    <button class="btn btn-ghost btn-sm" data-tab="wallet">Wallet</button>
    <button class="btn btn-ghost btn-sm" data-tab="tickets">Supporto</button>
    <button class="btn btn-ghost btn-sm" data-tab="addresses">Indirizzi</button>
    <button class="btn btn-ghost btn-sm" data-tab="profile">Profilo</button>
    <button class="btn btn-danger btn-sm" id="logoutBtn" style="margin-left:auto;">${'Esci'}</button>
  </div>
  <div id="tabContent"><div class="skeleton" style="height:260px;"></div></div>
</div>
<div id="app-footer"></div>
<script src="/js/api.js"></script>
<script src="/js/store.js"></script>
<script src="/js/layout.js"></script>
<script>
  let currentUser = null;

  async function guard() {
    currentUser = await ESH.layout('/dashboard.html');
    if (!currentUser) { location.href = '/login.html'; return; }
    document.getElementById('welcomeTitle').textContent = `Ciao, ${currentUser.name}`;
    loadTab('orders');
  }

  document.querySelectorAll('[data-tab]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-tab]').forEach(b => b.classList.remove('active-tab'));
      btn.classList.add('active-tab');
      loadTab(btn.dataset.tab);
    });
  });
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await ESH.api('/api/auth/logout', { method: 'POST' });
    location.href = '/';
  });

  async function loadTab(tab) {
    const el = document.getElementById('tabContent');
    el.innerHTML = '<div class="skeleton" style="height:260px;"></div>';
    if (tab === 'orders') return renderOrders(el);
    if (tab === 'wishlist') return renderWishlist(el);
    if (tab === 'wallet') return renderWallet(el);
    if (tab === 'tickets') return renderTickets(el);
    if (tab === 'addresses') return renderAddresses(el);
    if (tab === 'profile') return renderProfile(el);
  }

  async function renderOrders(el) {
    const r = await ESH.api('/api/my/orders');
    if (!r.ok || !r.data.orders.length) { el.innerHTML = '<div class="glass" style="padding:2rem;">Nessun ordine ancora.</div>'; return; }
    el.innerHTML = `<div class="glass" style="padding:0.5rem 1.5rem;"><table>
      <thead><tr><th>Ordine</th><th>Data</th><th>Totale</th><th>Stato</th><th>Pagamento</th></tr></thead>
      <tbody>${r.data.orders.map(o => `
        <tr><td>${o.order_number}</td><td>${new Date(o.created_at).toLocaleDateString('it-IT')}</td>
        <td>${ESH.formatPrice(o.total, o.currency)}</td>
        <td><span class="badge badge-muted">${o.status}</span></td>
        <td><span class="badge ${o.payment_status === 'paid' ? 'badge-success' : 'badge-warning'}">${o.payment_status}</span></td></tr>`).join('')}
      </tbody></table></div>`;
  }

  async function renderWishlist(el) {
    const r = await ESH.api('/api/my/wishlist');
    if (!r.ok || !r.data.products.length) { el.innerHTML = '<div class="glass" style="padding:2rem;">La tua wishlist e vuota.</div>'; return; }
    el.innerHTML = `<div class="grid grid-4">${r.data.products.map(p => `
      <a href="/product.html?slug=${p.slug}" class="glass product-card">
        <div class="product-info"><h4>${p.title}</h4><span class="price">${ESH.formatPrice(p.discount_price ?? p.price)}</span></div>
      </a>`).join('')}</div>`;
  }

  async function renderWallet(el) {
    const r = await ESH.api('/api/my/wallet');
    if (!r.ok) { el.innerHTML = '<div class="glass" style="padding:2rem;">Errore caricamento wallet.</div>'; return; }
    el.innerHTML = `
    <div class="glass mb-2" style="padding:1.6rem;"><span class="text-muted">Saldo disponibile</span><h2>${ESH.formatPrice(r.data.balance)}</h2></div>
    <div class="glass" style="padding:0.5rem 1.5rem;"><table>
      <thead><tr><th>Data</th><th>Tipo</th><th>Importo</th><th>Motivo</th></tr></thead>
      <tbody>${r.data.transactions.map(t => `<tr><td>${new Date(t.created_at).toLocaleDateString('it-IT')}</td>
        <td><span class="badge ${t.type === 'credit' ? 'badge-success' : 'badge-danger'}">${t.type}</span></td>
        <td>${ESH.formatPrice(t.amount)}</td><td>${t.reason || '—'}</td></tr>`).join('') || '<tr><td colspan="4" class="text-muted">Nessuna transazione.</td></tr>'}
      </tbody></table></div>`;
  }

  async function renderTickets(el) {
    const r = await ESH.api('/api/my/tickets');
    el.innerHTML = `
    <div class="glass mb-2" style="padding:1.4rem;">
      <h3 class="mb-1">Apri un ticket</h3>
      <div class="field"><label>Oggetto</label><input id="tSubject"></div>
      <div class="field"><label>Messaggio</label><textarea id="tMessage" rows="3"></textarea></div>
      <button class="btn btn-primary" id="tSubmit">Invia</button>
    </div>
    <div id="tList">${(r.ok && r.data.tickets.length) ? r.data.tickets.map(t => `
      <div class="glass mb-1" style="padding:1rem 1.4rem;"><div class="flex justify-between"><strong>${t.subject}</strong><span class="badge badge-muted">${t.status}</span></div></div>`).join('') : '<p class="text-muted">Nessun ticket aperto.</p>'}</div>`;

    document.getElementById('tSubmit').addEventListener('click', async () => {
      const subject = document.getElementById('tSubject').value.trim();
      const message = document.getElementById('tMessage').value.trim();
      if (!subject || !message) return ESH.toast('Compila oggetto e messaggio.', 'error');
      const res = await ESH.api('/api/my/tickets', { method: 'POST', body: { subject, message } });
      if (res.ok) { ESH.toast('Ticket inviato.', 'success'); renderTickets(el); }
      else ESH.toast(res.error, 'error');
    });
  }

  async function renderAddresses(el) {
    const r = await ESH.api('/api/my/addresses');
    el.innerHTML = `
    <div class="glass mb-2" style="padding:1.4rem;">
      <h3 class="mb-1">Aggiungi indirizzo</h3>
      <div class="form-row">
        <div class="field"><label>Indirizzo</label><input id="aLine1"></div>
        <div class="field"><label>Citta</label><input id="aCity"></div>
      </div>
      <div class="form-row">
        <div class="field"><label>CAP</label><input id="aZip"></div>
        <div class="field"><label>Paese</label><input id="aCountry" value="IT"></div>
      </div>
      <button class="btn btn-primary" id="aSubmit">Salva indirizzo</button>
    </div>
    <div id="aList">${(r.ok && r.data.addresses.length) ? r.data.addresses.map(a => `
      <div class="glass mb-1 flex justify-between items-center" style="padding:1rem 1.4rem;">
        <span>${a.line1}, ${a.city} ${a.postal_code} (${a.country})</span>
        <button class="icon-btn" data-del="${a.id}">&times;</button>
      </div>`).join('') : '<p class="text-muted">Nessun indirizzo salvato.</p>'}</div>`;

    document.getElementById('aSubmit').addEventListener('click', async () => {
      const body = { line1: val('aLine1'), city: val('aCity'), postal_code: val('aZip'), country: val('aCountry') };
      if (!body.line1 || !body.city || !body.postal_code) return ESH.toast('Compila i campi obbligatori.', 'error');
      const res = await ESH.api('/api/my/addresses', { method: 'POST', body });
      if (res.ok) { ESH.toast('Indirizzo salvato.', 'success'); renderAddresses(el); }
    });
    document.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', async () => {
      await ESH.api('/api/my/addresses/' + b.dataset.del, { method: 'DELETE' }); renderAddresses(el);
    }));
  }

  function renderProfile(el) {
    el.innerHTML = `
    <div class="glass" style="padding:1.6rem; max-width:420px;">
      <div class="field"><label>Nome</label><input id="pName" value="${currentUser.name}"></div>
      <div class="field"><label>Email</label><input value="${currentUser.email}" disabled></div>
      <button class="btn btn-primary" id="pSave">Salva modifiche</button>
    </div>`;
    document.getElementById('pSave').addEventListener('click', async () => {
      const res = await ESH.api('/api/my/profile', { method: 'PUT', body: { name: document.getElementById('pName').value } });
      ESH.toast(res.ok ? 'Profilo aggiornato.' : res.error, res.ok ? 'success' : 'error');
    });
  }

  function val(id) { return document.getElementById(id).value.trim(); }

  guard();
</script>
<style>.active-tab{ border-color:var(--blue) !important; color:var(--text) !important; background:rgba(59,109,255,0.1) !important; }</style>
</body>
</html>
