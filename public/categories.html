<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Categorie — ExecutiveShop</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="app-nav"></div>
<div class="page-header container">
  <div class="breadcrumbs"><a href="/">Home</a> / Categorie</div>
  <h1>Categorie</h1>
</div>
<div class="container section-sm" style="padding-top:0; max-width:820px;">

<div class="grid grid-4" id="catGrid"></div>
<script>document.addEventListener("DOMContentLoaded", async ()=>{ const r= await ESH.api("/api/categories"); if(r.ok) document.getElementById("catGrid").innerHTML = r.data.categories.map(c=>`<a href="/products.html?category=${c.slug}" class="glass feature-card tilt text-center"><h4>${c.name}</h4></a>`).join(""); });</script>

</div>
<div id="app-footer"></div>
<script src="/js/api.js"></script>
<script src="/js/store.js"></script>
<script src="/js/layout.js"></script>
<script>ESH.layout('/categories.html');</script>
</body>
</html>
