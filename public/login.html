<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accedi — ExecutiveShop</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="app-nav"></div>
<div class="auth-shell">
  <div class="glass-strong auth-card">
    <h2>Bentornato</h2>
    <p class="text-muted mb-2">Accedi al tuo account ExecutiveShop</p>
    <div id="formAlert"></div>
    <form id="loginForm">
      <div class="field"><label>Email</label><input type="email" id="email" required></div>
      <div class="field"><label>Password</label><input type="password" id="password" required></div>
      <div class="flex justify-between items-center mb-2">
        <label class="checkbox-row"><input type="checkbox" id="remember"> Ricordami</label>
        <a href="/forgot-password.html" style="font-size:0.82rem; color:var(--blue-2);">Password dimenticata?</a>
      </div>
      <button class="btn btn-primary btn-block" type="submit">Accedi</button>
    </form>
    <p class="auth-switch">Non hai un account? <a href="/register.html">Registrati</a></p>
    <hr class="divider">
    <p class="text-muted" style="font-size:0.78rem; text-align:center;">Demo:  /  &middot;  / </p>
  </div>
</div>
<div id="app-footer"></div>
<script src="/js/api.js"></script>
<script src="/js/store.js"></script>
<script src="/js/layout.js"></script>
<script>
  ESH.layout('/login.html');
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    btn.disabled = true;
    const r = await ESH.api('/api/auth/login', { method: 'POST', body: {
      email: document.getElementById('email').value,
      password: document.getElementById('password').value,
      remember: document.getElementById('remember').checked
    }});
    btn.disabled = false;
    if (!r.ok) { document.getElementById('formAlert').innerHTML = `<div class="alert alert-danger mb-2">${r.error}</div>`; return; }
    location.href = r.data.user.role === 'admin' ? '/admin/' : '/dashboard.html';
  });
</script>
</body>
</html>
