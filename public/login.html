<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — ExecutiveShop</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="app-nav"></div>

<div class="auth-shell">
  <div class="glass auth-card">
    <h2>Welcome back</h2>
    <p class="text-muted" style="margin-bottom:1.5rem;">Sign in to your account</p>
    
    <div style="background:var(--panel); border:1px solid var(--border); border-radius:var(--radius-sm); padding:0.8rem 1rem; margin-bottom:1.5rem; text-align:center;">
      <span style="color:var(--success); font-weight:700; font-size:1.1rem;" id="visitorCount">821</span>
      <span style="color:var(--muted); font-size:0.85rem;"> people are visiting this site</span>
    </div>

    <div class="field">
      <label>Email</label>
      <input id="email" type="email" placeholder="you@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input id="password" type="password" placeholder="Your password" autocomplete="current-password">
    </div>
    <button class="btn btn-primary btn-block mt-2" id="btnLogin">Sign in</button>

    <div class="mt-2" style="display:flex; justify-content:space-between; font-size:0.82rem;">
      <a href="/forgot-password.html" style="color:var(--blue-2);">Forgot password?</a>
      <a href="/register.html" style="color:var(--blue-2);">Create account</a>
    </div>
  </div>
</div>

<div id="app-footer"></div>

<script src="/js/api.js"></script>
<script src="/js/store.js"></script>
<script src="/js/layout.js"></script>
<script>
  ESH.layout('/login.html').then(function(user) {
    window.__eshUser = user;
  });

  // Simula contatore visitatori (random tra 800 e 850)
  var count = Math.floor(Math.random() * 51) + 800;
  document.getElementById("visitorCount").textContent = count;

  document.getElementById("btnLogin").addEventListener("click", async function() {
    var email = document.getElementById("email").value.trim();
    var password = document.getElementById("password").value.trim();
    if (!email || !password) return ESH.toast("Please fill in all fields.", "error");
    
    var btn = document.getElementById("btnLogin");
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Signing in...';
    
    var r = await ESH.api("/api/auth/login", { method: "POST", body: { email: email, password: password } });
    if (!r.ok) {
      ESH.toast(r.error || "Login failed", "error");
      btn.disabled = false;
      btn.textContent = "Sign in";
      return;
    }
    localStorage.setItem("esh_token", r.data.token);
    window.location.href = "/dashboard.html";
  });
</script>
</body>
</html>
