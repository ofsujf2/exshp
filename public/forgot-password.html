<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password dimenticata — ExecutiveShop</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="app-nav"></div>
<div class="page-header container">
  <div class="breadcrumbs"><a href="/">Home</a> / Recupera la password</div>
  <h1>Recupera la password</h1>
</div>
<div class="container section-sm" style="padding-top:0; max-width:820px;">

<div class="glass" style="padding:1.8rem; max-width:420px; margin:0 auto;">
  <div class="field"><label>Email</label><input type="email" id="fEmail"></div>
  <button class="btn btn-primary btn-block" id="fSend">Invia istruzioni</button>
</div>
<script>document.addEventListener("DOMContentLoaded",()=>{document.getElementById("fSend").addEventListener("click",async()=>{const r=await ESH.api("/api/auth/forgot-password",{method:"POST",body:{email:document.getElementById("fEmail").value}}); ESH.toast(r.ok? r.data.message : r.error, r.ok?"success":"error");});});</script>

</div>
<div id="app-footer"></div>
<script src="/js/api.js"></script>
<script src="/js/store.js"></script>
<script src="/js/layout.js"></script>
<script>ESH.layout('/forgot-password.html');</script>
</body>
</html>
